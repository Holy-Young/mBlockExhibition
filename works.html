<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>慧编程 · 学生作品</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Global Nav ── -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo-area">
        <a href="index.html" class="logo-link">
          <img src="assets/images/logo.png" alt="数据谷中学校" class="main-logo">
          <span class="logo-text">慧编程课例展示</span>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">课程首页</a></li>
        <li><a href="works.html" class="active">学生作品</a></li>
        <li><a href="about.html">关于课程</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <header class="page-hero">
    <p class="hero-eyebrow">STUDENT WORKS</p>
    <h1 class="hero-headline">学生作品集</h1>
    <p class="hero-sub">
      <span class="typewriter-wrap">
        <span id="typing-text"></span><span class="cursor">|</span>
      </span>
    </p>
  </header>

  <!-- ── Main ── -->
  <main class="container">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">作品总数</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-students">0</span>
        <span class="stat-label">参与同学</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-awards">0</span>
        <span class="stat-label">获奖作品</span>
      </div>
    </div>

    <!-- Section Title -->
    <div class="section-title">
      <h2>作品展示</h2>
      <div class="accent-line"></div>
      <p class="subtitle" style="margin-top:8px;">每一行代码，都是创造力的印记</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <span class="filter-label">筛选标签：</span>
      <button class="filter-btn active" data-filter="all">全部</button>
    </div>

    <!-- Cards Grid -->
    <div id="works-grid" class="grid"></div>

  </main>

  <!-- ── CTA ── -->
  <div class="container" style="padding-top:0;">
    <div class="cta-box">
      <h2>想展示你的作品？</h2>
      <p>将作品截图发给老师，审核通过后即可上墙展示</p>
      <a href="about.html#faq" class="btn-primary">了解如何提交</a>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-logo">
      <img src="assets/images/logo.png" alt="数据谷中学校">
      <span>慧编程课例展示 · 数据谷中学校</span>
    </div>
    <p>重庆市第八中学校数据谷中学 · 信息科技教研组 · 2019</p>
    <p style="margin-top:4px;">DATA VALLEY MIDDLE SCHOOL AFFILIATED TO CHONGQING NO.8 SECONDARY SCHOOL</p>
  </footer>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="work-modal">
    <div class="modal-box">
      <button class="modal-close" id="modal-close-btn">✕</button>
      <img class="modal-img" id="modal-img" src="" alt="">
      <div class="modal-author" id="modal-author"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    function typeEffect(el, text, speed = 80) {
      let i = 0;
      const t = setInterval(() => {
        if (i < text.length) { el.textContent += text[i++]; }
        else {
          clearInterval(t);
          setTimeout(() => {
            const d = setInterval(() => {
              if (el.textContent.length > 0) el.textContent = el.textContent.slice(0,-1);
              else { clearInterval(d); typeEffect(el, text, speed); }
            }, speed / 2);
          }, 1200);
        }
      }, speed);
    }

    let currentFilter = 'all';

    function renderWorks(filter) {
      const grid = document.getElementById('works-grid');
      const filtered = filter === 'all' ? worksData : worksData.filter(w => w.tags.includes(filter));
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔭</div><p>暂无匹配的作品，期待同学们的创作！</p></div>`;
        return;
      }
      grid.innerHTML = '';
      filtered.forEach(work => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openModal(work);
        const awardHtml = work.award ? `<span class="award-tag">🏆 ${work.award}</span>` : '';
        card.innerHTML = `
          <div class="card-img-wrap">
            <div class="card-img" style="background-image:url('${work.cover}'); height:100%; background-size:cover; background-position:center;"></div>
            <span class="work-badge">👤 ${work.author} · ${work.grade}</span>
          </div>
          <div class="card-body">
            <h3>${work.title}</h3>
            <div class="tags">${work.tags.map(t => `<span>${t}</span>`).join('')}${awardHtml}</div>
            <p class="card-desc">${work.desc}</p>
            <div class="stars" style="color:var(--ink-muted-48);font-size:12px;margin-top:auto;">📅 ${work.date} · 点击查看详情</div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function openModal(work) {
      document.getElementById('modal-img').src = work.cover;
      document.getElementById('modal-author').textContent = `👤 ${work.author} · ${work.grade}   📅 ${work.date}`;
      document.getElementById('modal-title').textContent = work.title;
      document.getElementById('modal-desc').textContent = work.desc;
      document.getElementById('modal-tags').innerHTML =
        work.tags.map(t => `<span>${t}</span>`).join('') +
        (work.award ? `<span style="color:#9a6c00;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)">🏆 ${work.award}</span>` : '');
      document.getElementById('modal-footer').textContent =
        work.lessonRef ? `关联课程：${work.lessonRef}   作品编号：${work.id}` : `作品编号：${work.id}`;
      document.getElementById('work-modal').classList.add('open');
    }

    document.getElementById('modal-close-btn').onclick = () => document.getElementById('work-modal').classList.remove('open');
    document.getElementById('work-modal').onclick = function(e) { if (e.target === this) this.classList.remove('open'); };

    function animateCount(el, target, dur = 900) {
      let s = 0; const step = target / (dur / 16);
      const t = setInterval(() => {
        s += step; if (s >= target) { el.textContent = target; clearInterval(t); }
        else el.textContent = Math.floor(s);
      }, 16);
    }

    function renderFilters() {
      const tags = [...new Set(worksData.flatMap(w => w.tags))];
      const bar = document.querySelector('.filter-bar');
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn'; btn.dataset.filter = tag; btn.textContent = tag;
        btn.onclick = function() {
          document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active'); currentFilter = tag; renderWorks(tag);
        };
        bar.appendChild(btn);
      });
      document.querySelector('[data-filter="all"]').onclick = function() {
        document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active'); currentFilter = 'all'; renderWorks('all');
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('stat-total').textContent = worksData.length;
      document.getElementById('stat-students').textContent = new Set(worksData.map(w => w.author)).size;
      document.getElementById('stat-awards').textContent = worksData.filter(w => w.award).length;
      renderFilters();
      renderWorks('all');
      const el = document.getElementById('typing-text');
      if (el) typeEffect(el, '每一行代码，都是创造力的印记...');
      setTimeout(() => {
        animateCount(document.getElementById('stat-total'), worksData.length);
        animateCount(document.getElementById('stat-students'), new Set(worksData.map(w => w.author)).size);
        animateCount(document.getElementById('stat-awards'), worksData.filter(w => w.award).length);
      }, 300);
    });
  </script>
</body>
</html>
