<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程详情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Global Nav ── -->
  <nav class="navbar detail-nav">
    <div class="nav-container">
      <a href="index.html" class="back-link">
        <span>←</span> 返回课程首页
      </a>
      <span class="logo-text" style="color:rgba(255,255,255,0.7);font-size:13px;">慧编程课例展示</span>
    </div>
  </nav>

  <!-- ── Console Header ── -->
  <header class="console-header">
    <div style="max-width:1100px;margin:0 auto;padding:0 var(--sp-xl);">
      <h1 id="d-title">加载中...</h1>
      <p id="d-intro">正在读取项目摘要...</p>
    </div>
  </header>

  <!-- ── Main Console ── -->
  <main class="main-console">
    <div class="console-grid">

      <!-- Left Column -->
      <div class="left-col">

        <!-- Video Panel -->
        <div class="tech-panel">
          <div class="panel-header">📺 成果演示</div>
          <div class="video-wrapper">
            <video id="d-video" controls>您的浏览器不支持视频播放。</video>
          </div>
        </div>

        <!-- Code Screenshots Panel -->
        <div class="tech-panel">
          <div class="panel-header">🧩 核心代码截图</div>
          <div class="main-image-view">
            <img id="d-code-main" src="" alt="代码截图">
          </div>
          <div id="d-code-thumbnails" class="thumbnail-list"></div>
        </div>

      </div>

      <!-- Right Column -->
      <div class="right-col">

        <!-- Download Resources -->
        <div class="tech-panel">
          <h2>💾 资源下载</h2>
          <div class="download-grid">
            <a id="btn-code" href="#" class="tech-btn" download>
              <span class="icon">💻</span>
              <div class="btn-text">
                <h3>源程序文件</h3>
                <p>.mblock / .py</p>
              </div>
            </a>
            <a id="btn-ppt" href="#" class="tech-btn" download>
              <span class="icon">📖</span>
              <div class="btn-text">
                <h3>教学课件</h3>
                <p>课堂演示 PPT</p>
              </div>
            </a>
            <a id="btn-assets" href="#" class="tech-btn" download>
              <span class="icon">🎨</span>
              <div class="btn-text">
                <h3>项目素材包</h3>
                <p>图片 / 音频资源</p>
              </div>
            </a>
          </div>
        </div>

        <!-- Teacher Note -->
        <div class="tech-panel">
          <h2>📡 老师的话</h2>
          <div class="teacher-note-panel">
            <p id="d-note">...</p>
          </div>
        </div>

        <!-- Back Button -->
        <div style="text-align:center;margin-top:8px;">
          <a href="index.html" class="btn-ghost" style="width:100%;justify-content:center;">← 返回课程长廊</a>
        </div>

      </div>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer style="margin-top:var(--sp-sec);">
    <div class="footer-logo">
      <img src="assets/images/logo.png" alt="数据谷中学校">
      <span>慧编程课例展示 · 数据谷中学校</span>
    </div>
    <p>重庆市第八中学校数据谷中学 · 信息科技教研组 · 2019</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
